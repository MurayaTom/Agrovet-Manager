<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroVet Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-mark">🌿</div>
        <div><h1>AgroVet Pro</h1><p>Kenya Stock Manager</p></div>
    </div>
    <div class="hbtns">
        <button class="hbtn hbtn-ghost" onclick="downloadBackup()">💾 Backup</button>
        <button class="hbtn hbtn-green" onclick="openAdd()">+ Add Product</button>
    </div>
</header>

<div class="page">
    <aside class="sidebar">
        <div class="cat-container">
            <button class="cb active" data-cat="all" onclick="setcat('all')">🗂 All (<span id="cnt-all">0</span>)</button>
            <button class="cb" data-cat="Animal Feeds" onclick="setcat('Animal Feeds')">🌾 Feeds (<span id="cnt-af">0</span>)</button>
            <button class="cb" data-cat="Veterinary Medicines" onclick="setcat('Veterinary Medicines')">💊 Meds (<span id="cnt-vm">0</span>)</button>
            <button class="cb" data-cat="Pesticides & Herbicides" onclick="setcat('Pesticides & Herbicides')">🧴 Pest (<span id="cnt-ph">0</span>)</button>
            <button class="cb" data-cat="Seeds & Fertilizers" onclick="setcat('Seeds & Fertilizers')">🌱 Seeds (<span id="cnt-sf">0</span>)</button>
        </div>
    </aside>

    <div class="content">
        <div class="stats">
            <div class="sc"><small>Today's Sales</small><div class="sv" id="stat-sales">Ksh 0</div></div>
            <div class="sc"><small>Inventory Value</small><div class="sv" id="stat-value">Ksh 0</div></div>
            <div class="sc"><small>Low Stock</small><div class="sv" id="stat-low">0</div></div>
        </div>
        
        <div class="toolbar">
            <input type="text" id="q" placeholder="Search by name or category..." oninput="render()">
        </div>

        <div class="tcard">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th class="col-name">Product & Category</th>
                            <th class="col-stock">Stock</th>
                            <th class="col-price">Buy</th>
                            <th class="col-price">Sell</th>
                            <th class="col-act">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="pmod">
    <div class="modal">
        <h2 id="mtitle">Product Details</h2>
        <div class="fg">
            <input type="hidden" id="eid">
            <input type="text" id="fn" placeholder="Product Name">
            <input type="text" id="fsk" placeholder="SKU">
            <select id="fc">
                <option>Animal Feeds</option><option>Veterinary Medicines</option>
                <option>Pesticides & Herbicides</option><option>Seeds & Fertilizers</option>
            </select>
            <input type="number" id="fq" placeholder="Qty">
            <input type="text" id="fu" placeholder="Unit (e.g. 50Kg Bag)">
            <input type="number" id="fb" placeholder="Buy Price">
            <input type="number" id="fs" placeholder="Sell Price">
            <button class="hbtn hbtn-green" onclick="savep()">Save Product</button>
            <button class="hbtn hbtn-ghost" style="color:black; border:1px solid #ddd" onclick="cm('pmod')">Cancel</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
